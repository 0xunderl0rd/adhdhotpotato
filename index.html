<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="ADHD Hot Potato">
    <title>ADHD Hot Potato</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='52'%3E%F0%9F%A5%94%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="site-shell" aria-label="ADHD Hot Potato">
      <button class="clicker" type="button" aria-label="Click the closed foil hot potato">
        <span class="aura" aria-hidden="true"></span>
        <span class="crack" aria-hidden="true"></span>
        <img
          class="hot-potato"
          src="assets/foil-closed.png"
          alt="A closed steaming ball of crinkled foil"
        >
      </button>
      <div class="particle-field" aria-hidden="true"></div>
      <p class="sr-only" aria-live="polite">The hot potato is wrapped in foil.</p>
    </main>
  </body>
</html>
